name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish GPG public key
        run: |
          set -euo pipefail
          GPG_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons --fingerprint | awk -F: '/^fpr:/ { print $10; exit }')"
          test -n "$GPG_FINGERPRINT"
          gpg --batch --keyserver keyserver.ubuntu.com --send-keys "$GPG_FINGERPRINT"

          for attempt in 1 2 3 4 5; do
            GNUPGHOME="$(mktemp -d)"
            if gpg --homedir "$GNUPGHOME" --batch --keyserver keyserver.ubuntu.com --recv-keys "$GPG_FINGERPRINT"; then
              rm -rf "$GNUPGHOME"
              exit 0
            fi
            rm -rf "$GNUPGHOME"
            sleep 15
          done

          echo "GPG public key was not visible on keyserver.ubuntu.com in time."
          exit 1

      - name: Publish to Maven Central
        run: mvn -B -Pcentral-release deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Prepare release POM
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          cp pom.xml "target/operaton-javascript-polyglot-${VERSION}.pom"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operaton-javascript-polyglot-${{ github.ref_name }}
          path: |
            target/operaton-javascript-polyglot-*.jar
            target/operaton-javascript-polyglot-*.pom
            target/operaton-javascript-polyglot-*.asc
          if-no-files-found: error
          retention-days: 30
