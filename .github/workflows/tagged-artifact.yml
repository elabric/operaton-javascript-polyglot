name: Build Tagged Artifact

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build package
        run: mvn -B package

      - name: Prepare release POM
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          cp pom.xml "target/operaton-javascript-polyglot-${VERSION}.pom"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operaton-javascript-polyglot-${{ github.ref_name }}
          path: |
            target/operaton-javascript-polyglot-*.jar
            target/operaton-javascript-polyglot-*.pom
          if-no-files-found: error
          retention-days: 30
